name: Release

# Fires when a tag like `v4.0.0-beta.1` or `v4.0.0` is pushed. Tags are
# the source of truth — no hand-rolled publishing from a laptop.
#
# Before the first run, add an `NPM_TOKEN` repository secret:
#   Settings → Secrets and variables → Actions → New repository secret
# Use an automation token from npmjs.com so the 2FA check passes.
#
# Tag conventions used by the dist-tag selection below:
#   v4.0.0-beta.1 → publishes to `next`   (anything with `-…` is pre-release)
#   v4.0.0        → publishes to `latest` (promote consciously)
#   v3.1.7-legacy → publishes to `legacy` (future v3 security patches)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write  # for npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm test
      - run: npm run size

      - name: Check tag matches package version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Pick dist-tag
        id: dist_tag
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          if [[ "$TAG" == *-legacy* ]]; then
            echo "tag=legacy" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == *-* ]]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        run: npm publish --tag ${{ steps.dist_tag.outputs.tag }} --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
